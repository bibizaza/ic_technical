<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 950px; height: 390px;
    font-family: 'DM Sans', 'Calibri', sans-serif;
    background: white; color: #1a1e2e;
    overflow: hidden; position: relative;
  }
  .chart-area { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; }
  canvas { width: 100% !important; height: 100% !important; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="chart-area">
  <canvas id="chart"></canvas>
</div>

<script>
// ========== DATA — Claude Code replaces this block ==========
const indices = [
  { label: 'Ibovespa',   flag: '🇧🇷', prev: [2, 2], now: [2, 2], color: '#2EA043' },
  { label: 'Nikkei 225', flag: '🇯🇵', prev: [1, 6], now: [1, 6], color: '#7B2D8E' },
  { label: 'SMI',        flag: '🇨🇭', prev: [5, 2], now: [5, 2], color: '#636363' },
  { label: 'Mexbol',     flag: '🇲🇽', prev: [6, 1], now: [6, 1], color: '#0288D1' },
  { label: 'S&P 500',    flag: '🇺🇸', prev: [4, 5], now: [4, 5], color: '#1A237E' },
  { label: 'Sensex',     flag: '🇮🇳', prev: [9, 4], now: [9, 4], color: '#E65100' },
  { label: 'Dax',        flag: '🇩🇪', prev: [7, 8], now: [7, 8], color: '#D32F2F' },
  { label: 'CSI 300',    flag: '🇨🇳', prev: [3, 9], now: [3, 9], color: '#E64A19' },
  { label: 'Tasi',       flag: '🇸🇦', prev: [8, 6], now: [8, 6], color: '#2E7D32' },
];
// ========== END DATA ==========

// Label offsets to avoid overlap — Claude Code can adjust if needed
// Format: [dx, dy, textAlign] relative to dot position
const labelOffsets = {};

// Smart label placement: detect collisions and offset
function computeLabelPositions(chart) {
  const xScale = chart.scales.x;
  const yScale = chart.scales.y;
  const positions = indices.map(idx => ({
    x: xScale.getPixelForValue(idx.now[0]),
    y: yScale.getPixelForValue(idx.now[1]),
    label: idx.label,
  }));

  // Default: label to the right
  positions.forEach(p => { p.dx = 10; p.dy = 0; p.align = 'left'; });

  // If dot is on the right side of chart, label to the left
  const chartMidX = (xScale.left + xScale.right) / 2;
  positions.forEach(p => {
    if (p.x < chartMidX * 0.4) {
      p.dx = -10; p.align = 'right';
    }
  });

  return positions;
}

// Quadrant background plugin
const quadrantPlugin = {
  id: 'quadrants',
  beforeDraw(chart) {
    const ctx = chart.ctx;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    const midX = xScale.getPixelForValue(4.75);
    const midY = yScale.getPixelForValue(4.75);
    const left = xScale.left;
    const right = xScale.right;
    const top = yScale.top;
    const bottom = yScale.bottom;

    ctx.save();

    // Top-left: strong breadth + strong fundamentals
    ctx.fillStyle = 'rgba(46, 160, 67, 0.05)';
    ctx.fillRect(left, top, midX - left, midY - top);

    // Top-right: weak breadth + strong fundamentals
    ctx.fillStyle = 'rgba(245, 158, 11, 0.04)';
    ctx.fillRect(midX, top, right - midX, midY - top);

    // Bottom-left: strong breadth + weak fundamentals
    ctx.fillStyle = 'rgba(245, 158, 11, 0.04)';
    ctx.fillRect(left, midY, midX - left, bottom - midY);

    // Bottom-right: weak breadth + weak fundamentals
    ctx.fillStyle = 'rgba(220, 38, 38, 0.04)';
    ctx.fillRect(midX, midY, right - midX, bottom - midY);

    // Quadrant corner labels
    ctx.font = '500 9px "DM Sans"';

    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#15803D';
    ctx.textAlign = 'left';
    ctx.fillText('Strong Breadth + Fundamentals', left + 6, top + 13);

    ctx.fillStyle = '#B45309';
    ctx.textAlign = 'right';
    ctx.fillText('Weak Breadth · Strong Fundamentals', right - 6, top + 13);

    ctx.fillStyle = '#B45309';
    ctx.textAlign = 'left';
    ctx.fillText('Strong Breadth · Weak Fundamentals', left + 6, bottom - 5);

    ctx.fillStyle = '#991B1B';
    ctx.textAlign = 'right';
    ctx.fillText('Weak Breadth + Fundamentals', right - 6, bottom - 5);

    ctx.globalAlpha = 1;

    // Center cross — subtle dashed
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(midX, top);
    ctx.lineTo(midX, bottom);
    ctx.moveTo(left, midY);
    ctx.lineTo(right, midY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }
};

// Arrow + dot + label plugin
const arrowPlugin = {
  id: 'arrows',
  afterDraw(chart) {
    const ctx = chart.ctx;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;

    indices.forEach(idx => {
      const x0 = xScale.getPixelForValue(idx.prev[0]);
      const y0 = yScale.getPixelForValue(idx.prev[1]);
      const x1 = xScale.getPixelForValue(idx.now[0]);
      const y1 = yScale.getPixelForValue(idx.now[1]);

      const hasMoved = idx.prev[0] !== idx.now[0] || idx.prev[1] !== idx.now[1];

      if (hasMoved) {
        ctx.save();

        // Dashed line from prev to current — low opacity
        ctx.strokeStyle = idx.color;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.25;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();
        ctx.setLineDash([]);

        // Arrowhead — slightly more visible
        const angle = Math.atan2(y1 - y0, x1 - x0);
        const headLen = 7;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x1 - headLen * Math.cos(angle - Math.PI / 6), y1 - headLen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(x1 - headLen * Math.cos(angle + Math.PI / 6), y1 - headLen * Math.sin(angle + Math.PI / 6));
        ctx.closePath();
        ctx.fillStyle = idx.color;
        ctx.fill();

        // Ghost dot at previous position
        ctx.globalAlpha = 0.15;
        ctx.beginPath();
        ctx.arc(x0, y0, 4, 0, Math.PI * 2);
        ctx.fillStyle = idx.color;
        ctx.fill();

        ctx.restore();
      }

      // Current position — solid dot with white ring
      ctx.save();
      ctx.beginPath();
      ctx.arc(x1, y1, 5.5, 0, Math.PI * 2);
      ctx.fillStyle = idx.color;
      ctx.globalAlpha = 0.92;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // Label — flag + name
      ctx.save();
      ctx.font = '500 10.5px "DM Sans"';
      ctx.fillStyle = idx.color;
      ctx.globalAlpha = 0.88;
      ctx.textBaseline = 'middle';

      // Position label: right side by default, left if dot is near right edge
      const chartRight = xScale.right;
      const labelText = `${idx.flag} ${idx.label}`;
      const textWidth = ctx.measureText(labelText).width;

      if (x1 - textWidth - 14 < xScale.left) {
        // Too close to right edge of chart (remember: axis is reversed)
        ctx.textAlign = 'left';
        ctx.fillText(labelText, x1 + 10, y1);
      } else if (x1 + textWidth + 14 > chartRight) {
        // Too close to left edge
        ctx.textAlign = 'right';
        ctx.fillText(labelText, x1 - 10, y1);
      } else {
        // Default: label to the right of dot
        ctx.textAlign = 'left';
        ctx.fillText(labelText, x1 + 10, y1);
      }

      ctx.restore();
    });
  }
};

// Chart
new Chart(document.getElementById('chart'), {
  type: 'scatter',
  data: { datasets: [{ data: [] }] },
  plugins: [quadrantPlugin, arrowPlugin],
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: {
      padding: { top: 6, right: 12, bottom: 2, left: 6 }
    },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    scales: {
      x: {
        type: 'linear',
        reverse: true,
        min: 0.3,
        max: 9.7,
        ticks: {
          stepSize: 1,
          callback: v => Number.isInteger(v) ? '#' + v : '',
          font: { family: '"DM Sans"', size: 10, weight: '400' },
          color: '#a0a8b8',
          padding: 4,
        },
        grid: { color: 'rgba(0,0,0,0.03)', drawBorder: false },
        border: { display: false },
        title: {
          display: true,
          text: 'Breadth Rank',
          font: { family: '"DM Sans"', size: 11, weight: '600' },
          color: '#7a8599',
          padding: { top: 2 },
        }
      },
      y: {
        type: 'linear',
        reverse: true,
        min: 0.3,
        max: 9.7,
        ticks: {
          stepSize: 1,
          callback: v => Number.isInteger(v) ? '#' + v : '',
          font: { family: '"DM Sans"', size: 10, weight: '400' },
          color: '#a0a8b8',
          padding: 4,
        },
        grid: { color: 'rgba(0,0,0,0.03)', drawBorder: false },
        border: { display: false },
        title: {
          display: true,
          text: 'Fundamental Rank',
          font: { family: '"DM Sans"', size: 11, weight: '600' },
          color: '#7a8599',
        }
      }
    }
  }
});
</script>
</body>
</html>
