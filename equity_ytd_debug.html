
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/calibri-light');

        * {

        body {

            background: #FFFFFF;

        .chart-wrapper {

            width: 100%;
            height: 100%;

        .chart-title {
            text-align: center;
            font-size: 42px;
            font-weight: 600;
            color: #1B3A5A;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: calc(100% - 90px);
        }
    </style>
</head>
<body>
    <div class="chart-wrapper">
        <div class="chart-title">YTD 2025 Performance of Equity Indices (%)</div>
        <div class="chart-container">
            <canvas id="ytdChart"></canvas>
        </div>
    </div>

    <script>
        const labels = ["Dec", "Jan", "Jan", "Jan", "Jan", "Feb", "Feb", "Feb", "Feb", "Mar", "Mar", "Mar", "Mar", "Apr", "Apr", "Apr", "Apr", "May", "May", "May", "May", "May", "Jun", "Jun", "Jun", "Jun", "Jul", "Jul", "Jul", "Jul", "Aug", "Aug", "Aug", "Aug", "Aug", "Sep", "Sep", "Sep", "Sep", "Oct", "Oct", "Oct", "Oct", "Oct", "Nov", "Nov", "Nov", "Nov", "Dec", "Dec", "Dec", "Dec"];
        const datasets = [{"label": "Ibov", "data": [34.0, -1.2, 1.7, 1.8, 4.9, 3.6, 6.6, 5.7, 2.1, 4.0, 7.2, 10.0, 9.7, 5.8, 6.2, 7.8, 12.0, 12.3, 13.5, 15.7, 14.6, 13.9, 13.2, 14.1, 14.0, 13.8, 17.4, 13.2, 10.9, 11.0, 10.1, 13.0, 13.3, 14.7, 17.6, 18.6, 18.3, 21.3, 20.9, 19.9, 17.0, 19.2, 21.5, 24.3, 28.1, 31.1, 28.7, 32.2, 30.8, 33.7, 31.7, 33.8], "borderColor": "#9333EA", "backgroundColor": "transparent"}, {"label": "Mexbol", "data": [30.0, 0.2, 0.9, 3.7, 3.4, 6.7, 9.2, 8.5, 5.7, 6.7, 6.0, 6.4, 7.4, 3.9, 4.0, 7.1, 14.6, 12.7, 14.2, 17.1, 18.0, 16.8, 17.3, 16.0, 13.6, 15.9, 17.1, 14.3, 13.7, 15.8, 14.9, 17.3, 17.8, 19.6, 18.6, 22.1, 24.8, 23.6, 25.8, 25.2, 22.3, 24.7, 23.5, 26.8, 28.0, 25.9, 25.0, 28.4, 28.0, 30.7, 29.2, 32.6], "borderColor": "#06B6D4", "backgroundColor": "transparent"}, {"label": "Nikkei 225", "data": [26.2, -1.8, -3.6, 0.1, -0.8, -2.8, -1.9, -2.8, -6.9, -7.5, -7.1, -5.6, -7.0, -15.3, -15.8, -12.9, -10.5, -7.7, -6.0, -5.4, -6.9, -4.8, -5.4, -5.2, -3.7, 0.6, -0.2, -0.8, -0.2, 3.9, 2.3, 4.8, 8.7, 6.9, 7.1, 7.8, 12.2, 12.9, 13.7, 14.7, 20.5, 19.3, 23.6, 31.4, 26.0, 26.3, 21.9, 26.0, 26.6, 27.4, 24.1, 27.2], "borderColor": "#10B981", "backgroundColor": "transparent"}, {"label": "Dax", "data": [23.0, 1.5, 5.0, 7.5, 9.2, 9.4, 13.1, 11.9, 13.3, 15.6, 15.5, 15.0, 12.8, 3.7, 2.3, 6.5, 11.7, 16.0, 18.0, 19.4, 18.7, 20.5, 22.1, 18.1, 17.3, 20.7, 19.5, 21.8, 22.0, 21.6, 17.7, 21.4, 22.4, 22.4, 20.1, 18.5, 19.0, 18.7, 19.2, 22.5, 21.8, 19.7, 21.8, 20.3, 18.4, 19.9, 16.0, 19.7, 20.7, 21.5, 22.0, 22.3], "borderColor": "#DC2626", "backgroundColor": "transparent"}, {"label": "CSI 300", "data": [17.7, -5.1, -3.1, -2.6, -3.0, -1.1, 0.1, 1.1, -1.1, 0.2, 1.8, -0.5, -0.5, -1.9, -4.7, -4.1, -3.8, -4.2, -2.3, -1.2, -1.3, -2.4, -1.5, -1.8, -2.2, -0.3, 1.2, 2.0, 3.1, 4.9, 3.1, 4.3, 6.8, 11.3, 14.3, 13.4, 14.9, 14.4, 15.6, 17.9, 17.3, 14.7, 18.4, 17.9, 18.9, 17.6, 13.2, 15.0, 16.5, 16.4, 16.1, 18.4], "borderColor": "#F97316", "backgroundColor": "transparent"}, {"label": "S&P 500", "data": [17.3, -0.9, 2.0, 3.7, 2.7, 2.5, 4.0, 2.2, 1.2, -1.9, -4.1, -3.6, -5.1, -13.7, -8.8, -10.2, -6.1, -3.3, -3.8, 1.3, -1.3, 0.5, 2.0, 1.6, 1.5, 5.0, 6.8, 6.4, 7.1, 8.6, 6.1, 8.6, 9.7, 10.0, 9.8, 10.2, 11.9, 13.3, 13.0, 14.2, 11.4, 13.3, 15.5, 16.3, 14.4, 14.5, 12.3, 16.4, 16.8, 16.1, 16.2, 17.8], "borderColor": "#3B82F6", "backgroundColor": "transparent"}, {"label": "SMI", "data": [14.4, 1.6, 3.4, 5.9, 8.6, 8.6, 10.7, 11.6, 12.1, 12.7, 11.3, 12.7, 10.7, 0.4, -3.1, 0.5, 2.9, 5.6, 4.2, 6.3, 5.2, 5.4, 6.6, 4.7, 2.3, 3.3, 3.2, 2.9, 3.3, 3.1, 2.0, 2.3, 4.1, 5.7, 5.1, 6.6, 5.1, 4.4, 2.8, 7.8, 7.6, 9.0, 8.3, 5.5, 6.0, 8.9, 8.9, 10.6, 11.5, 11.1, 13.5, 14.2], "borderColor": "#1B3A5A", "backgroundColor": "transparent"}, {"label": "Sensex", "data": [9.1, -1.0, -1.9, -2.5, -0.8, -0.4, -2.8, -3.6, -6.3, -4.9, -5.5, -1.6, -0.9, -3.6, -3.8, 0.5, 1.4, 3.0, 1.7, 5.4, 4.6, 4.2, 5.2, 3.8, 5.5, 7.6, 6.8, 5.6, 4.6, 4.3, 3.1, 2.2, 3.1, 4.1, 2.1, 3.3, 4.8, 5.7, 2.9, 3.9, 5.6, 7.4, 7.8, 7.4, 6.5, 8.2, 9.1, 9.7, 9.7, 9.1, 8.7, 8.8], "borderColor": "#22D3EE", "backgroundColor": "transparent"}, {"label": "TASI", "data": [-13.0, 0.5, 1.8, 2.6, 3.1, 3.3, 2.9, 2.9, 0.6, -1.9, -2.6, -2.3, -0.1, -1.3, -4.4, -4.0, -2.3, -4.1, -5.6, -4.6, -7.0, -8.7, -8.6, -9.9, -11.8, -8.0, -6.6, -6.3, -8.6, -9.1, -9.3, -9.2, -10.0, -9.7, -10.8, -11.5, -13.2, -10.4, -6.1, -4.5, -3.8, -2.8, -3.5, -3.2, -6.1, -7.1, -8.5, -11.6, -11.7, -11.0, -13.2, -12.5], "borderColor": "#9CA3AF", "backgroundColor": "transparent"}];
        const scale = 3;

        // ============================================
        // LABEL COLLISION AVOIDANCE ALGORITHM
        // ============================================
        function resolveOverlaps(labels, minGap) {
            // Sort by y position (top to bottom)
            labels.sort((a, b) => a.y - b.y);

            // Push down overlapping labels
            for (let i = 1; i < labels.length; i++) {
                const prev = labels[i - 1];
                const curr = labels[i];
                const gap = curr.y - prev.y;

                if (gap < minGap) {
                    curr.y = prev.y + minGap;
                    curr.adjusted = true;
                }
            }

            return labels;
        }

        // ============================================
        // CHART CONFIGURATION
        // ============================================
        const ctx = document.getElementById('ytdChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets.map(d => ({
                    ...d,
                    borderWidth: 2.5 * scale / 3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    tension: 0.3,
                    fill: false,
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(27, 58, 90, 0.9)',
                        titleFont: { family: 'Calibri', size: 10 * scale },
                        bodyFont: { family: 'Calibri', size: 9 * scale },
                        padding: 8 * scale,
                        cornerRadius: 4 * scale,
                        callbacks: {
                            label: function(context) {
                                const value = context.parsed.y;
                                const sign = value >= 0 ? '+' : '';
                                return `${context.dataset.label}: ${sign}${value.toFixed(1)}%`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: true,
                            color: 'rgba(0, 0, 0, 0.05)',
                            drawBorder: false,
                        },
                        ticks: {
                            font: { family: 'Calibri', size: 9 * scale, weight: '500' },
                            color: '#64748B'
                        }
                    },
                    y: {
                        grid: {
                            display: true,
                            color: function(context) {
                                if (context.tick.value === 0) {
                                    return 'rgba(27, 58, 90, 0.3)';
                                }
                                return 'rgba(0, 0, 0, 0.05)';
                            },
                            lineWidth: function(context) {
                                if (context.tick.value === 0) {
                                    return 2;
                                }
                                return 1;
                            },
                            drawBorder: false,
                        },
                        ticks: {
                            font: { family: 'Calibri', size: 9 * scale, weight: '500' },
                            color: '#64748B',
                            callback: function(value) {
                                return value + '%';
                            }
                        }
                    }
                },
                layout: {
                    padding: {
                        right: 110 * scale
                    }
                }
            },
            plugins: [{
                id: 'endLabelsNoOverlap',
                afterDraw: function(chart) {
                    const ctx = chart.ctx;
                    const minGap = 16 * scale;

                    // Collect label positions
                    let labelData = [];

                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        const lastPoint = meta.data[meta.data.length - 1];

                        if (lastPoint) {
                            const value = dataset.data[dataset.data.length - 1];
                            const sign = value >= 0 ? '+' : '';
                            const label = `${dataset.label}: ${sign}${value.toFixed(1)}%`;

                            labelData.push({
                                x: lastPoint.x,
                                y: lastPoint.y,
                                originalY: lastPoint.y,
                                label: label,
                                color: dataset.borderColor,
                                adjusted: false
                            });
                        }
                    });

                    // Resolve overlaps
                    labelData = resolveOverlaps(labelData, minGap);

                    // Draw labels
                    const fontSize = 9 * scale;
                    labelData.forEach(item => {
                        ctx.save();
                        ctx.font = `600 ${fontSize}px Calibri`;
                        const textWidth = ctx.measureText(item.label).width;
                        const labelX = item.x + 10 * scale;
                        const labelY = item.y;
                        const pillHeight = 14 * scale;
                        const pillPadding = 4 * scale;

                        // Draw connector line if adjusted
                        if (item.adjusted) {
                            ctx.beginPath();
                            ctx.strokeStyle = item.color + '60';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([2 * scale, 2 * scale]);
                            ctx.moveTo(item.x + 2, item.originalY);
                            ctx.lineTo(labelX - 2, labelY);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }

                        // Draw background pill
                        ctx.fillStyle = item.color + '15';
                        ctx.beginPath();
                        ctx.roundRect(
                            labelX - pillPadding,
                            labelY - pillHeight/2,
                            textWidth + pillPadding * 2.5,
                            pillHeight,
                            3 * scale
                        );
                        ctx.fill();

                        // Draw border
                        ctx.strokeStyle = item.color + '30';
                        ctx.lineWidth = 1;
                        ctx.stroke();

                        // Draw text
                        ctx.fillStyle = item.color;
                        ctx.textBaseline = 'middle';
                        ctx.fillText(item.label, labelX, labelY);
                        ctx.restore();
                    });
                }
            }]
        });
    </script>
</body>
</html>
